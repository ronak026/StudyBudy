<div class="card sticky top-20 animate-fade-in p-5">
  <h2 class="mb-3 text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-zinc-500">Browse Topics</h2>
  <ul class="flex flex-col gap-0.5">
    <li>
      <a href="{% url 'home' %}" class="sidebar-link {% if not request.GET.q %}bg-indigo-50 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-300{% endif %}">
        All
        <span class="rounded-full px-2 py-0.5 text-xs {% if not request.GET.q %}bg-white text-indigo-700 dark:bg-zinc-800 dark:text-indigo-300{% else %}bg-gray-100 text-gray-500 dark:bg-zinc-800 dark:text-zinc-400{% endif %}">{{ total_rooms }}</span>
      </a>
    </li>
    {% for topic in topics %}
    <li {% if forloop.counter > 5 %}class="topic-extra hidden"{% endif %}>
      <a href="{% url 'home' %}?q={{ topic.name }}" class="sidebar-link {% if request.GET.q == topic.name %}bg-indigo-50 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-300{% endif %}">
        <span class="truncate">{{ topic.name }}</span>
        <span class="rounded-full bg-gray-100 px-2 py-0.5 text-xs text-gray-500 dark:bg-zinc-800 dark:text-zinc-400">{{ topic.room_set.all.count }}</span>
      </a>
    </li>
    {% empty %}
    <li class="px-3 py-2 text-sm text-gray-400">No topics yet.</li>
    {% endfor %}
  </ul>
  {% if topics.count > 5 %}
  <button
    type="button"
    data-topics-more
    aria-expanded="false"
    class="mt-2 flex w-full items-center justify-center gap-1 rounded-md px-3 py-2 text-sm font-medium text-indigo-600 transition hover:bg-indigo-50 dark:text-indigo-400 dark:hover:bg-indigo-500/10"
  >
    <span data-more-label>More</span>
    <span class="material-symbols-rounded text-[18px]" aria-hidden="true">expand_more</span>
  </button>
  {% endif %}
</div>
