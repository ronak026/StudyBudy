<div class="topics card animate-fadein-up">
  <div class="topics__header">
    <h2>Browse Topics</h2>
  </div>
  <ul class="topics__list scroll">
    <li>
      <a href="{% url 'home' %}" class="active"
        >All <span>{{topics.count}}</span></a
      >
    </li>
    {% for topic in topics %}
    <li>
      <a href="{% url 'home' %}?q={{topic.name}}"
        >{{ topic.name }}<span>{{topic.room_set.all.count}}</span></a
      >
    </li>
    {% endfor %}
    <a class="btn btn--link" href="{% url 'topic' %}">
      More
      <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
    </a>
  </ul>
</div>
