{% extends 'main.html' %}

{% block start %}

    <main class="delete-item layout">
        <div class="container">
            <div class="layout__box card animate-fadein-up">
                <div class="layout__boxHeader">
                    <div class="layout__boxTitle">
                        <a href="{{request.META.HTTP_REFERER}}" aria-label="Go back">
                            <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
                        </a>
                        <h3>Back</h3>
                    </div>
                </div>
                <div class="layout__body">
                    <form class="form" action="" method="POST">
                        {% csrf_token %}
                        <div class="form__group">
                            <p>Are you sure you want to delete "{{obj}}"?</p>
                        </div>

                        <div class="form__action">
                            <input class="btn btn--main" type="submit" value="Confirm" />
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>
{% endblock %}
