{% extends 'main.html' %}
{% block start %}
<div class="mx-auto max-w-md px-4 py-10 sm:py-16">
  <div class="card animate-fade-up overflow-hidden">
    <div class="flex items-center gap-2 border-b border-gray-200 px-6 py-5 dark:border-zinc-800">
      <a href="{{ request.META.HTTP_REFERER }}" class="icon-btn" aria-label="Go back">
        <span class="material-symbols-rounded text-[22px]" aria-hidden="true">arrow_back</span>
      </a>
      <h1 class="text-lg font-bold">Confirm delete</h1>
    </div>
    <div class="p-6">
      <p class="text-sm text-gray-600 dark:text-zinc-300">Are you sure you want to delete &ldquo;<span class="font-semibold text-gray-900 dark:text-zinc-100">{{ obj }}</span>&rdquo;? This can't be undone.</p>
      <form action="" method="POST" class="mt-6 flex justify-end gap-3">
        {% csrf_token %}
        <a class="btn" href="{{ request.META.HTTP_REFERER }}">Cancel</a>
        <button class="btn btn-primary border-rose-600 bg-rose-600 hover:border-rose-700 hover:bg-rose-700" type="submit">Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
