<div class="card sticky top-20 animate-fade-in p-5">
  <h2 class="mb-3 text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-zinc-500">Recent Activity</h2>
  <div class="scrollbar-slim flex max-h-[32rem] flex-col gap-4 overflow-y-auto pr-1">
    {% for message in room_message %}
    <div class="border-b border-gray-100 pb-4 last:border-0 last:pb-0 dark:border-zinc-800">
      <div class="mb-1.5 flex items-center justify-between">
        <a href="{% url 'user-profile' message.user.id %}" class="flex items-center gap-2">
          <span class="h-7 w-7 overflow-hidden rounded-full bg-gray-200 dark:bg-zinc-700">
            <img src="{{ message.user.avatar.url }}" alt="{{ message.user.name }} avatar" class="h-full w-full object-cover" />
          </span>
          <span class="leading-tight">
            <span class="block text-xs font-semibold text-gray-900 dark:text-zinc-100">{{ message.user.name|default:message.user.username }}</span>
            <span class="block text-[11px] text-gray-400 dark:text-zinc-500">{{ message.created|timesince }} ago</span>
          </span>
        </a>
        {% if request.user == message.user %}
        <a href="{% url 'delete-message' message.id %}" title="Delete message" aria-label="Delete message" class="icon-btn p-1 hover:text-rose-600">
          <span class="material-symbols-rounded text-[18px]" aria-hidden="true">close</span>
        </a>
        {% endif %}
      </div>
      <p class="text-xs text-gray-500 dark:text-zinc-400">
        replied to <a href="{% url 'room' message.room.id %}" class="font-medium text-indigo-600 hover:underline dark:text-indigo-400">{{ message.room }}</a>
      </p>
      <p class="mt-1.5 rounded-lg bg-gray-50 px-3 py-2 text-xs text-gray-600 dark:bg-zinc-800 dark:text-zinc-300">{{ message.body }}</p>
    </div>
    {% empty %}
    <p class="py-6 text-center text-sm text-gray-400">No recent activity yet.</p>
    {% endfor %}
  </div>
</div>
