<div class="activities">
  <div class="activities__header">
    <h2>Recent Activities</h2>
  </div>
  <!-- Show only 4 activities by default, scroll for more -->
  <div class="activities__scroll show-4-activities">
    {% for message in room_message %}
    <div class="activities__box">
      <div class="activities__boxHeader roomListRoom__header">
        <a
          href="{% url 'user-profile' message.user.id %}"
          class="roomListRoom__author"
        >
          <div class="avatar avatar--small">
            <img src="{{message.user.avatar.url}}" alt="{{ message.user.name }} avatar" />
          </div>
          <p>
            {{ message.user.name }}
            <span> {{message.created|timesince }} ago</span>
          </p>
        </a>
        {% if request.user == message.user %}
        <div class="roomListRoom__actions">
          <a href="{% url 'delete-message' message.id %}" title="Delete message" aria-label="Delete message">
            <span class="material-symbols-rounded" aria-hidden="true">close</span>
          </a>
        </div>
        {% endif %}
      </div>
      <div class="activities__boxContent">
        <p>
          replied to post “<a href="{% url 'room' message.room.id%}"
            >{{message.room}}</a
          >”
        </p>
        <div class="activities__boxRoomContent">{{message.body}}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
