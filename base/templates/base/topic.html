{% extends 'main.html' %}

{% block start %}
    <main class="create-room layout">
      <div class="container">
        <div class="layout__box card animate-fadein-up">
          <div class="layout__boxHeader">
            <div class="layout__boxTitle">
              <a href="{% url 'home' %}" aria-label="Back to home">
                <span class="material-symbols-rounded" aria-hidden="true">arrow_back</span>
              </a>
              <h3>Browse Topics</h3>
            </div>
          </div>

          <div class="topics-page layout__body">
            <form class="header__search" method="GET" action="" role="search">
              <label>
                <span class="visually-hidden">Search topics</span>
                <span class="material-symbols-rounded" aria-hidden="true">search</span>
                <input name="q" placeholder="Search for topics" aria-label="Search topics" />
              </label>
            </form>

            <ul class="topics__list scroll">
              <li>
                <a href="{% url 'topic' %}" class="active">All <span>{{ topics.count }}</span></a>
              </li>
              {% for topic in topics %}
                <li>
                  <a href="{% url 'home' %}?q={{ topic.name }}">{{ topic.name }} <span>{{ topic.room_set.all.count }}</span></a>
                </li>
              {% empty %}
                <li class="empty-state">No topics found.</li>
              {% endfor %}
            </ul>
          </div>
        </div>
      </div>
    </main>
{% endblock %}
