<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server error — StudyBuddy</title>
    <style>
      /* Standalone styles: 500.html renders without context processors/static. */
      :root { color-scheme: light dark; }
      * { margin: 0; box-sizing: border-box; }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: #fafafa;
        color: #18181b;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #09090b; color: #fafafa; }
        .card { background: #161618 !important; border-color: #2a2a30 !important; }
        .muted { color: #a1a1aa !important; }
      }
      .card {
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 14px;
        padding: 4rem 3rem;
        text-align: center;
        max-width: 44rem;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      }
      h1 { font-size: 4.4rem; color: #4f46e5; }
      h2 { font-size: 1.8rem; margin: 0.6rem 0 1rem; }
      .muted { color: #71717a; font-size: 1rem; margin-bottom: 2rem; }
      a {
        display: inline-block;
        background: #4f46e5;
        color: #fff;
        text-decoration: none;
        padding: 0.9rem 1.8rem;
        border-radius: 10px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>500</h1>
      <h2>Something went wrong</h2>
      <p class="muted">An unexpected error occurred on our end. Please try again in a moment.</p>
      <a href="/">Back to home</a>
    </div>
  </body>
</html>
