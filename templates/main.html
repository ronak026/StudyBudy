<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="{% static 'base/assets/favicon.ico' %}"
      type="image/x-icon"
    />
    <!-- Google Fonts + Material Symbols icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />
    <link rel="stylesheet" href="{% static 'style/style.css' %}" />
    <title>StudyBuddy - Find study partners around the world!</title>
    <!-- Apply saved theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark-mode");
      }
    </script>
  </head>

  <body>
    <div class="site-wrapper">
      {% include 'negbr.html' %}
      {% if messages %}
      <div id="popup-message" class="custom-modal show" role="status" aria-live="polite">
        <div class="custom-modal-content">
          {% for message in messages %}
          <p>{{ message }}</p>
          {% endfor %}
          <button type="button" class="custom-modal-close" data-close-modal>
            Close
          </button>
        </div>
      </div>
      {% endif %}
      <div class="main-content">{% block start %}{% endblock %}</div>
    </div>
    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
