<!DOCTYPE html>
{% load static tailwind_tags %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="{% static 'favicon.ico' %}" type="image/x-icon" />
    <!-- Google Fonts + Material Symbols icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />
    {% tailwind_css %}
    <title>StudyBuddy - Find study partners around the world!</title>
    <!-- Apply saved theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark-mode");
      }
    </script>
    <style>
      :root { font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    </style>
  </head>

  <body class="min-h-screen bg-gray-50 text-gray-900 antialiased dark:bg-zinc-950 dark:text-zinc-100">
    {% include 'negbr.html' %}

    {% if messages %}
    <div
      id="popup-message"
      class="fixed left-1/2 top-5 z-[100] -translate-x-1/2 animate-slide-down"
      role="status"
      aria-live="polite"
    >
      <div class="flex items-center gap-4 rounded-xl border border-gray-200 bg-white px-5 py-3.5 text-sm shadow-xl dark:border-zinc-700 dark:bg-zinc-900">
        <div>
          {% for message in messages %}<p>{{ message }}</p>{% endfor %}
        </div>
        <button
          type="button"
          data-close-modal
          class="rounded-md border border-gray-200 bg-gray-50 px-3 py-1 text-xs font-medium text-gray-600 transition hover:bg-gray-100 dark:border-zinc-700 dark:bg-zinc-800 dark:text-zinc-300 dark:hover:bg-zinc-700"
        >
          Close
        </button>
      </div>
    </div>
    {% endif %}

    {% block start %}{% endblock %}

    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
