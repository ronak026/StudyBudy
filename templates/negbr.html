{% load static %}
<header class="header header--loggedIn">
    <div class="container">
        <a href="{% url 'home' %}" class="header__logo">
            <img src="{% static 'images/reading.png' %}" alt="StudyBuddy logo" />
            <h1>StudyBuddy</h1>
        </a>
        <form class="header__search" method="GET" action="{% url 'home' %}" role="search">
            <label>
                <span class="visually-hidden">Search rooms</span>
                <span class="material-symbols-rounded" aria-hidden="true">search</span>
                <input name="q" placeholder="Search for posts" aria-label="Search rooms" />
            </label>
        </form>
        <nav class="header__menu">


            <!-- Logged In -->
      {% if request.user.is_authenticated %}

      <div class="header__user">
        <a href="{% url 'user-profile' request.user.id%}">
          <div class="avatar avatar--medium active">
            <img src="{{request.user.avatar.url}}" alt="{{ request.user.username }} avatar" />
          </div>
          <p>
            {{request.user.username}} <span>@{{request.user.username}}</span>
          </p>
        </a>
        <button class="dropdown-button" type="button" aria-label="Open account menu" aria-haspopup="true">
          <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
        </button>
      </div>
      <!-- Theme Toggle Button beside user info -->
      {% include '_theme_toggle.html' %}
      {% else %}
      <!-- Not Logged In -->
      <div class="header__right">
        <a href="{% url 'login' %}">
          <img src="{% static 'images/avatar.svg' %}" alt="" />
          <p>Login</p>
        </a>
        {% include '_theme_toggle.html' %}
      </div>
      {% endif %}
      <div class="dropdown-menu">
        <a href="{% url 'update-user'%}" class="dropdown-link"
          ><span class="material-symbols-rounded" aria-hidden="true">manage_accounts</span>
          Update Profile</a
        >
        <a href="{% url 'logout' %}" class="dropdown-link"
          ><span class="material-symbols-rounded" aria-hidden="true">logout</span>
          Logout</a
        >
      </div>
  </div>
</header>
<hr/>
<script>
  const themeToggle = document.getElementById('theme-toggle');
  const sunIcon = document.getElementById('theme-sun');
  const moonIcon = document.getElementById('theme-moon');

  function setTheme(isDark) {
    document.documentElement.classList.toggle('dark-mode', isDark);
    document.querySelectorAll('#theme-sun').forEach(el => {
      el.style.display = isDark ? 'none' : 'inline';
    });
    document.querySelectorAll('#theme-moon').forEach(el => {
      el.style.display = isDark ? 'inline' : 'none';
    });
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  if (themeToggle) {
    themeToggle.addEventListener('click', () => {
      const isDark = !document.documentElement.classList.contains('dark-mode');
      setTheme(isDark);
    });
    // Sync the icon with the theme already applied in <head>.
    setTheme(document.documentElement.classList.contains('dark-mode'));
  }
</script>
