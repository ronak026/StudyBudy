<!-- Reusable light/dark theme toggle button. Icon visibility is driven by JS in negbr.html. -->
<button id="theme-toggle" class="btn btn--pill" type="button" title="Toggle theme" aria-label="Toggle light or dark theme">
  <span id="theme-sun" class="material-symbols-rounded" style="display: inline;" aria-hidden="true">light_mode</span>
  <span id="theme-moon" class="material-symbols-rounded" style="display: none;" aria-hidden="true">dark_mode</span>
</button>
