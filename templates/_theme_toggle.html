<!-- Reusable light/dark theme toggle button. Icon visibility is driven by JS in negbr.html. -->
<button
  id="theme-toggle"
  type="button"
  title="Toggle theme"
  aria-label="Toggle light or dark theme"
  class="icon-btn"
>
  <span id="theme-sun" class="material-symbols-rounded text-[22px]" style="display: inline-flex" aria-hidden="true">light_mode</span>
  <span id="theme-moon" class="material-symbols-rounded text-[22px]" style="display: none" aria-hidden="true">dark_mode</span>
</button>
